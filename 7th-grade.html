<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7th Grade — Linor's English Hub</title>
    <link rel="stylesheet" href="shared.css">
    <script src="shared.js" defer></script>
    <style>
        :root {
            --grade-1: #ff6b6b;
            --grade-2: #ee5a24;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <p class="teacher-name">✨ Linor Peretz</p>
            <h1>
                📕 7th Grade
                <span class="sub">English Hub</span>
            </h1>
            <p class="header-subtitle">Your complete English learning space</p>

            <div class="quick-stats">
                <div class="stat-item">📚 <strong id="totalUnits">10</strong> Units</div>
                <div class="stat-item">✅ <strong id="availableCount">0</strong> Available Now</div>
                <div class="stat-item">🔜 <strong id="comingCount">10</strong> Coming Soon</div>
            </div>
        </div>
    </header>

    <div class="container">

        <a href="index.html" class="nav-btn">← Back to All Grades</a>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all', this)">All Units</button>
            <button class="filter-tab" onclick="setFilter('available', this)">✅ Available</button>
            <button class="filter-tab" onclick="setFilter('coming', this)">🔜 Coming Soon</button>
        </div>

        <div class="search-wrapper">
            <input type="text" id="searchInput" onkeyup="filterUnits()" placeholder="🔍 Search units...">
        </div>

        <p id="noResults" style="display:none; text-align:center; color: var(--text-light); padding: 20px;">
            🔍 No units found.
        </p>

        <div class="units-grid" id="unitsGrid">
            <div class="loading-message" id="loadingMessage">
                ⏳ Checking available units...
            </div>
        </div>

    </div>

    <footer class="footer">
        <p>Made with 💕 for 7th grade students · Linor Peretz</p>
    </footer>

    <script>
        var gradeConfig = {
            grade: "7th",
            units: [
                { number: 1,  title: "Hello World" },
                { number: 2,  title: "My Daily Routine" },
                { number: 3,  title: "School Life" },
                { number: 4,  title: "My Neighborhood" },
                { number: 5,  title: "Celebrations and Holidays" },
                { number: 6,  title: "Animals and Pets" },
                { number: 7,  title: "Shopping and Money" },
                { number: 8,  title: "Weather and Seasons" },
                { number: 9,  title: "Health and Body" },
                { number: 10, title: "Stories and Imagination" }
            ]
        };

        autoDetectUnits(gradeConfig);
    </script>

</body>
</html>
